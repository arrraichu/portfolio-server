name: Auto Build Docker Image
on:
  push:
    branches:
      - "main"
      - "releases/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:

      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,enable=true,priority=1000,value={{ date 'YYYYMMDD-HHmmss' tz='America/New_York' }}-{{ sha }}
      
      - name: Trust registry CA
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ secrets.DOCKER_REGISTRY }}
          echo "${{ secrets.REGISTRY_CA_CERT }}" | \
            sudo tee /etc/docker/certs.d/${{ secrets.DOCKER_REGISTRY }}/ca.crt > /dev/null
      
      - name: Docker Login to Private Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."${{ secrets.DOCKER_REGISTRY }}"]
              ca=["/etc/docker/certs.d/${{ secrets.DOCKER_REGISTRY }}/ca.crt"]
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
